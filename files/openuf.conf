# openuf — configuración
#
# controller_ip:    IP o hostname del controlador UniFi
# lan_if:           interfaz LAN principal (para MAC e IP del AP)
# ufmodel:          modelo emulado (u6-inwall recomendado)
# inform_interval:  segundos entre inform (mínimo 5)
# enable_announce:  1=activar descubrimiento UDP (puerto 10001)
# enable_inform:    1=activar inform HTTP (adopción y telemetría)

controller_ip   = 192.168.1.2
lan_if          = br-lan
ufmodel         = u6-inwall
inform_interval = 10
enable_announce = 1
enable_inform   = 1
